<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8">
  <title>מחיר גרם זהב וכסף בשקלים</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      direction: rtl;
      text-align: right;
      padding: 20px;
      background: #f7f7f7;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 20px;
    }
    .box {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 8px;
      font-size: 22px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>

  <h1>מחיר גרם זהב וכסף בשקלים</h1>

  <div class="box" id="gold">טוען נתונים...</div>
  <div class="box" id="silver"></div>

  <script>
    const OUNCE_TO_GRAM = 31.1035;

    async function getUSDILS() {
      const res = await fetch("https://api.exchangerate.host/latest?base=USD&symbols=ILS");
      const data = await res.json();
      return data.rates.ILS;
    }

    async function getMetals() {
      const res = await fetch("https://holy-block-7981.gnuxrzhtk.workers.dev");
      const data = await res.json();
      return data[0]; // metals.live מחזיר מערך, האובייקט הראשון מכיל את הנתונים
    }

    async function updatePrices() {
      try {
        const usdIls = await getUSDILS();
        const metals = await getMetals();

        const goldOunce = metals.gold;
        const silverOunce = metals.silver;

        const goldGram = (goldOunce / OUNCE_TO_GRAM) * usdIls;
        const silverGram = (silverOunce / OUNCE_TO_GRAM) * usdIls;

        document.getElementById("gold").innerText =
          "מחיר גרם זהב: " + goldGram.toFixed(2) + " ₪";

        document.getElementById("silver").innerText =
          "מחיר גרם כסף: " + silverGram.toFixed(2) + " ₪";

      } catch (err) {
        document.getElementById("gold").innerText = "שגיאה בטעינת הנתונים";
        document.getElementById("silver").innerText = "";
      }
    }

    updatePrices();
  </script>

</body>
</html>
